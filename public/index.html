<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Study Site</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
    }

    header, main, footer {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    h1, h2 { margin-top: 0; }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
    }

    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>HTTP Server Study</h1>
      <p>Nginx 学習用のサンプルページです。</p>
      <a class="btn" href="#about">詳しく見る</a>
    </header>

    <main id="about">
      <section>
        <h2>このページで確認すること</h2>
        <ul>
          <li>Nginx で配信できているか</li>
          <li>HTML/CSS の反映ができるか</li>
          <li>更新後に rsync で公開先へ同期できるか</li>
        </ul>
      </section>
    </main>

    <footer>
      <small>&copy; 2026 My Study Site</small>
    </footer>
  </div>
</body>
</html>
